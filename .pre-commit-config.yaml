# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        language: python
        entry: pip-audit .
        additional_dependencies: ["pip-audit"]
        # args: ["."]
        pass_filenames: false
        stages:
          - pre-commit
          - pre-merge-commit
