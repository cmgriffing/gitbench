id: f001
description: WIP commits - two consecutive WIP commits should be squashed
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo '# Project' > README.md"
  - "git add README.md"
  - "git commit -m 'Initial commit'"
  - "echo 'print(1)' > main.py"
  - "git add main.py"
  - "git commit -m 'WIP: add main.py'"
  - "echo 'print(2)' >> main.py"
  - "git add main.py"
  - "git commit -m 'WIP: continue work'"
  - "echo 'print(3)' >> main.py"
  - "git add main.py"
  - "git commit -m 'Complete feature'"
prompt: "Analyze this git history and identify which consecutive commits should be squashed together to create a cleaner history. Focus on WIP (Work In Progress) commits that represent incomplete work. Provide the commit hashes or commit messages of the commits to squash, in the order they should be combined."
expected: "WIP: add main.py, WIP: continue work"
scoring:
  type: similarity
  threshold: 0.5
