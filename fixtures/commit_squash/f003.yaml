id: f003
description: Related changes split across commits
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo '// v1' > app.js"
  - "git add app.js"
  - "git commit -m 'Add app.js v1'"
  - "echo '// v2' > app.js"
  - "git add app.js"
  - "git commit -m 'WIP: update app.js'"
  - "echo '// v3' > app.js"
  - "git add app.js"
  - "git commit -m 'WIP: more updates'"
  - "echo '// final' > app.js"
  - "git add app.js"
  - "git commit -m 'Finalize app.js'"
prompt: "Analyze this git history. Multiple consecutive commits updating the same file suggest the changes should be combined. Identify the commits that should be squashed together. Provide the commit messages in order."
expected: "WIP: update app.js, WIP: more updates"
scoring:
  type: similarity
  threshold: 0.5
