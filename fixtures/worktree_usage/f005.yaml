id: f005
description: "Create worktree with new branch"
setup:
  - "git init"
  - "git config user.email 'test@test.com'"
  - "git config user.name 'Test User'"
  - "echo 'Hello' > hello.txt"
  - "git add hello.txt"
  - "git commit -m 'Initial commit'"
prompt: "Create a git worktree at '../new-feature' with a new branch called 'new-feature'. Output ONLY the git worktree command, nothing else."
expected: "git worktree add -b new-feature ../new-feature main"
scoring:
  type: state_assertions
  expected_state:
    assertions:
      - type: dir_exists
        path: "../new-feature"
      - type: branch_exists
        name: "new-feature"
